<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGISTIX — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --amber: #f59e0b; --amber-dk: #d97706; --bg: #060610; --surface: #0c0c1a; --border: rgba(255,255,255,0.08); --text: #e4e4e7; --muted: #71717a; --danger: #f87171; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

.page { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

.card { width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px 36px 36px; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }

.brand { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.brand svg { width: 22px; height: 22px; color: var(--amber); }
.brand-name { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--amber); }
.brand-badge { font-size: 0.38rem; color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 0.1rem 0.35rem; border-radius: 9999px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }

h1 { font-size: 1.3rem; font-weight: 600; margin: 8px 0 4px; letter-spacing: -0.01em; }
.subtitle { color: var(--muted); font-size: 0.8rem; margin: 0 0 28px; }

label { display: block; font-size: 0.55rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
input[type="email"], input[type="password"] { width: 100%; padding: 11px 13px; font-size: 0.85rem; font-family: inherit; color: #fff; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; outline: none; transition: border-color 0.15s; }
input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(245,158,11,0.12); }
input::placeholder { color: rgba(255,255,255,0.2); }
.field { margin-bottom: 16px; }

button[type="submit"] { width: 100%; margin-top: 8px; padding: 12px 16px; font-size: 0.85rem; font-weight: 600; font-family: inherit; color: #000; background: var(--amber); border: none; border-radius: 8px; cursor: pointer; letter-spacing: 0.02em; transition: background 0.15s; }
button[type="submit"]:hover:not(:disabled) { background: var(--amber-dk); }
button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

.error { display: none; margin-top: 14px; padding: 10px 12px; font-size: 0.7rem; color: var(--danger); background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); border-radius: 8px; }
.error.show { display: block; }

.footer { margin-top: 24px; font-size: 0.55rem; color: var(--muted); text-align: center; }
.footer a { color: var(--amber); text-decoration: none; }

.chain { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 16px; font-size: 0.45rem; color: rgba(255,255,255,0.2); }
.chain-dot { width: 4px; height: 4px; border-radius: 50%; background: #34d399; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="page">
  <form class="card" id="loginForm" autocomplete="on">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
      <span class="brand-name">Logistix</span>
      <span class="brand-badge">by CORTEX</span>
    </div>
    <h1>Operations Portal</h1>
    <p class="subtitle">Sign in to access the command center.</p>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="username" placeholder="you@company.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password">
    </div>

    <button type="submit" id="submitBtn">Sign In</button>
    <div class="error" id="error"></div>

    <div class="footer">Innovative Blockchain Solutions &middot; <a href="./dashboard.html">Demo Simulator →</a></div>
    <div class="chain"><span class="chain-dot"></span> Base Sepolia · On-Chain Verified</div>
  </form>
</div>

<script type="module">
  import { supabase } from './auth.js';

  const { data: { session } } = await supabase.auth.getSession();
  if (session) window.location.replace('./hq.html');

  const form = document.getElementById('loginForm');
  const emailEl = document.getElementById('email');
  const passEl = document.getElementById('password');
  const btn = document.getElementById('submitBtn');
  const errorEl = document.getElementById('error');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const { error } = await supabase.auth.signInWithPassword({
        email: emailEl.value.trim(),
        password: passEl.value,
      });
      if (error) { errorEl.textContent = error.message; errorEl.classList.add('show'); return; }
      window.location.replace('./hq.html');
    } catch (err) {
      errorEl.textContent = err.message; errorEl.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
